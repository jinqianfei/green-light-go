services:
  - type: web
    name: green-light-go
    env: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --threads 4 server:app
    envVars:
      - key: YOLO_MODEL_PATH
        value: yolov8n.pt
