<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>绿灯行 - 红绿灯识别助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ===== iPhone Frame ===== */
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #000;
    border-radius: 50px;
    padding: 12px;
    position: relative;
    box-shadow:
      0 0 0 2px #333,
      0 0 0 4px #1a1a1a,
      0 30px 80px rgba(0,0,0,0.8),
      inset 0 0 0 2px #222;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    background: #1a1a2e;
  }

  /* Dynamic Island */
  .dynamic-island {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    background: #000;
    border-radius: 20px;
    z-index: 100;
  }

  /* Status Bar */
  .status-bar {
    height: 54px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 28px 6px;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    position: relative;
    z-index: 50;
  }

  /* Home Indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
    z-index: 100;
  }

  /* ===== Pages ===== */
  .page {
    position: absolute;
    inset: 0;
    transition: opacity 0.4s ease, transform 0.4s ease;
    display: flex;
    flex-direction: column;
  }

  .page.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateX(30px);
  }

  /* ===== Onboarding Page ===== */
  .onboard-page {
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    padding: 0 24px;
  }

  .onboard-header {
    padding-top: 70px;
    text-align: center;
  }

  .onboard-header h1 {
    font-size: 36px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 4px;
  }

  .onboard-header .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-top: 8px;
  }

  .onboard-steps {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 32px;
    padding: 20px 0;
  }

  .onboard-step {
    display: flex;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 320px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.6s ease forwards;
  }

  .onboard-step:nth-child(1) { animation-delay: 0.2s; }
  .onboard-step:nth-child(2) { animation-delay: 0.5s; }
  .onboard-step:nth-child(3) { animation-delay: 0.8s; }

  @keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .step-icon {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 32px;
  }

  .step-icon.step1 { background: linear-gradient(135deg, #00d26a22, #00d26a44); border: 1px solid #00d26a55; }
  .step-icon.step2 { background: linear-gradient(135deg, #4a90d922, #4a90d944); border: 1px solid #4a90d955; }
  .step-icon.step3 { background: linear-gradient(135deg, #ffa50222, #ffa50244); border: 1px solid #ffa50255; }

  .step-text {
    flex: 1;
  }

  .step-text .step-num {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .step-text .step-desc {
    font-size: 18px;
    color: #fff;
    font-weight: 700;
    margin-top: 4px;
    line-height: 1.4;
  }

  .onboard-footer {
    padding-bottom: 40px;
    text-align: center;
  }

  .disclaimer {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 24px;
    line-height: 1.6;
    padding: 0 16px;
  }

  .start-btn {
    width: 100%;
    max-width: 320px;
    height: 56px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #00d26a, #00b85c);
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 32px rgba(0,210,106,0.3);
  }

  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,210,106,0.4); }
  .start-btn:active { transform: translateY(0); }

  /* ===== Main Page ===== */
  .main-page {
    background: #1a1a2e;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .main-header {
    padding-top: 70px;
    text-align: center;
    width: 100%;
  }

  .main-header h1 {
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 6px;
  }

  .main-header .tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-top: 4px;
  }

  /* ===== Camera Preview Area ===== */
  .camera-area {
    width: 100%;
    margin-top: 16px;
    position: relative;
  }

  .camera-preview {
    width: 100%;
    height: 200px;
    border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.08);
    background: #12121f;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.4s ease, opacity 0.4s ease;
  }

  .camera-preview.active {
    border-color: rgba(0,210,106,0.3);
  }

  .camera-preview video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .camera-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.25);
    font-size: 14px;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .camera-placeholder svg {
    opacity: 0.4;
  }

  .camera-preview.active .camera-placeholder {
    opacity: 0;
  }

  /* Camera error overlay */
  .camera-error {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(18,18,31,0.95);
    border-radius: 14px;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    text-align: center;
    padding: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .camera-error.show {
    opacity: 1;
    pointer-events: auto;
  }

  .camera-error svg {
    opacity: 0.5;
    margin-bottom: 4px;
  }

  /* Scanning overlay on camera */
  .camera-scan-overlay {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    overflow: hidden;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .camera-scan-overlay.active {
    opacity: 1;
  }

  .scan-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00d26a, transparent);
    box-shadow: 0 0 12px rgba(0,210,106,0.6);
    animation: scanLineMove 2s ease-in-out infinite;
  }

  @keyframes scanLineMove {
    0% { top: 0; }
    50% { top: 100%; }
    100% { top: 0; }
  }

  /* Central Button Area */
  .button-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
  }

  .main-btn-wrapper {
    position: relative;
    width: 200px;
    height: 200px;
  }

  .main-btn-ring {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.06);
    transition: all 0.4s ease;
  }

  .main-btn-ring-outer {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.03);
    transition: all 0.4s ease;
  }

  .main-btn {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: none;
    background: #2a2a3e;
    color: rgba(255,255,255,0.7);
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    position: relative;
    z-index: 2;
    transition: all 0.4s ease;
    box-shadow:
      0 4px 20px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.05);
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  .main-btn:focus-visible {
    outline: 3px solid #00d26a;
    outline-offset: 4px;
  }

  /* Pressing state */
  .main-btn-wrapper.pressing .main-btn {
    background: #33334d;
    color: rgba(255,255,255,0.9);
    box-shadow:
      0 0 40px rgba(0,210,106,0.15),
      0 0 80px rgba(0,210,106,0.08),
      inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .main-btn-wrapper.pressing .main-btn-ring {
    border-color: rgba(0,210,106,0.3);
    box-shadow: 0 0 20px rgba(0,210,106,0.1);
  }

  /* Scanning animation */
  .main-btn-wrapper.scanning .main-btn-ring {
    border-color: rgba(0,210,106,0.5);
    animation: ringPulse 1.2s ease-in-out infinite;
  }

  .main-btn-wrapper.scanning .main-btn-ring-outer {
    border-color: rgba(0,210,106,0.2);
    animation: ringPulse 1.2s ease-in-out infinite 0.3s;
  }

  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.06); opacity: 0.5; }
  }

  /* Scanning dots animation */
  .scan-dots {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    z-index: 3;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .main-btn-wrapper.scanning .scan-dots {
    opacity: 1;
  }

  .scan-dot {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #00d26a;
    border-radius: 50%;
    animation: scanDotMove 2s linear infinite;
  }

  .scan-dot:nth-child(1) { animation-delay: 0s; }
  .scan-dot:nth-child(2) { animation-delay: 0.5s; }
  .scan-dot:nth-child(3) { animation-delay: 1s; }
  .scan-dot:nth-child(4) { animation-delay: 1.5s; }

  @keyframes scanDotMove {
    0% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { top: 10%; left: 50%; transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
  }

  /* Result states */
  .main-btn-wrapper.result-green .main-btn {
    background: linear-gradient(135deg, #00d26a, #00b85c);
    color: #fff;
    box-shadow:
      0 0 60px rgba(0,210,106,0.4),
      0 0 120px rgba(0,210,106,0.15),
      inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .main-btn-wrapper.result-green .main-btn-ring {
    border-color: rgba(0,210,106,0.5);
    box-shadow: 0 0 30px rgba(0,210,106,0.2);
  }

  .main-btn-wrapper.result-red .main-btn {
    background: linear-gradient(135deg, #ff4757, #e84141);
    color: #fff;
    box-shadow:
      0 0 60px rgba(255,71,87,0.4),
      0 0 120px rgba(255,71,87,0.15),
      inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .main-btn-wrapper.result-red .main-btn-ring {
    border-color: rgba(255,71,87,0.5);
    box-shadow: 0 0 30px rgba(255,71,87,0.2);
  }

  .main-btn-wrapper.result-yellow .main-btn {
    background: linear-gradient(135deg, #ffa502, #e89400);
    color: #fff;
    box-shadow:
      0 0 60px rgba(255,165,2,0.4),
      0 0 120px rgba(255,165,2,0.15),
      inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .main-btn-wrapper.result-yellow .main-btn-ring {
    border-color: rgba(255,165,2,0.5);
    box-shadow: 0 0 30px rgba(255,165,2,0.2);
  }

  .main-btn-wrapper.result-gray .main-btn {
    background: linear-gradient(135deg, #555570, #44445a);
    color: rgba(255,255,255,0.8);
    box-shadow:
      0 0 40px rgba(100,100,140,0.2),
      inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .main-btn-wrapper.result-gray .main-btn-ring {
    border-color: rgba(150,150,180,0.3);
  }

  /* Traffic light icon inside button */
  .traffic-light-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -70%);
    opacity: 0.15;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .main-btn-wrapper.scanning .traffic-light-icon,
  .main-btn-wrapper.result-green .traffic-light-icon,
  .main-btn-wrapper.result-red .traffic-light-icon,
  .main-btn-wrapper.result-yellow .traffic-light-icon {
    opacity: 0.25;
  }

  /* Status Area */
  .status-area {
    width: 100%;
    padding-bottom: 50px;
    text-align: center;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .status-text {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    min-height: 33px;
    transition: all 0.3s ease;
  }

  .status-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    margin-top: 6px;
    min-height: 20px;
  }

  /* Settings Icon */
  .settings-btn {
    position: absolute;
    bottom: 50px;
    right: 20px;
    width: 44px;
    height: 44px;
    border: none;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    color: rgba(255,255,255,0.3);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    z-index: 10;
  }

  .settings-btn:hover {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.6);
  }

  .settings-btn:focus-visible {
    outline: 2px solid #00d26a;
    outline-offset: 2px;
  }

  /* ===== Settings Panel ===== */
  .settings-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .settings-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .settings-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #252540;
    border-radius: 24px 24px 0 0;
    padding: 20px 24px 40px;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.35s ease;
  }

  .settings-overlay.show .settings-panel {
    transform: translateY(0);
  }

  .settings-handle {
    width: 36px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .settings-title {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 20px;
  }

  .setting-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .setting-label {
    font-size: 16px;
    color: rgba(255,255,255,0.8);
  }

  .setting-desc {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-top: 2px;
  }

  /* Toggle switch */
  .toggle {
    width: 50px;
    height: 28px;
    background: #3a3a55;
    border-radius: 14px;
    position: relative;
    cursor: pointer;
    transition: background 0.3s;
    border: none;
    padding: 0;
  }

  .toggle.on { background: #00d26a; }

  .toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.3s;
  }

  .toggle.on::after { transform: translateX(22px); }

  /* ===== Responsive ===== */
  @media (max-width: 420px) {
    .phone-frame {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }
    .phone-screen { border-radius: 0; }
    .dynamic-island { display: none; }
    .status-bar { padding-top: 10px; height: 44px; }
  }

  /* ===== Animations ===== */
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }

  .main-btn-wrapper:not(.pressing):not(.scanning):not(.result-green):not(.result-red):not(.result-yellow):not(.result-gray) .main-btn {
    animation: breathe 3s ease-in-out infinite;
  }

  /* Ripple effect */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transform: scale(0);
    animation: rippleAnim 0.6s ease-out;
    pointer-events: none;
  }

  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  /* ===== Toast Notification ===== */
  .toast {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(40,40,60,0.95);
    color: rgba(255,255,255,0.9);
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 13px;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    text-align: center;
    max-width: 300px;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }

  .toast.toast-error {
    border-color: rgba(255,71,87,0.3);
    background: rgba(60,20,25,0.95);
  }

  .toast.toast-warning {
    border-color: rgba(255,165,2,0.3);
    background: rgba(60,45,10,0.95);
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-screen" id="phoneScreen">

    <!-- Dynamic Island -->
    <div class="dynamic-island"></div>

    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>
      <span style="display:flex;gap:6px;align-items:center;">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><rect x="0" y="5" width="3" height="7" rx="1" opacity="0.4"/><rect x="4.5" y="3" width="3" height="9" rx="1" opacity="0.6"/><rect x="9" y="1" width="3" height="11" rx="1" opacity="0.8"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 2C5.5 2 3.2 3 1.5 4.7L0 3.2C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.2l-1.5 1.5C12.8 3 10.5 2 8 2z" opacity="0.5"/><path d="M8 5C6.3 5 4.8 5.7 3.7 6.8L2.2 5.3C3.7 3.8 5.7 3 8 3s4.3.8 5.8 2.3l-1.5 1.5C11.2 5.7 9.7 5 8 5z" opacity="0.75"/><circle cx="8" cy="10" r="2"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="23" height="12" rx="3" stroke="white" stroke-opacity="0.35"/><rect x="25" y="4" width="2" height="5" rx="1" fill="white" fill-opacity="0.4"/><rect x="2" y="2" width="18" height="9" rx="1.5" fill="#00d26a"/></svg>
      </span>
    </div>

    <!-- ===== Onboarding Page ===== -->
    <div class="page onboard-page" id="onboardPage">
      <div class="onboard-header">
        <h1>绿灯行</h1>
        <p class="subtitle">红绿灯智能识别助手</p>
      </div>

      <div class="onboard-steps">
        <div class="onboard-step" role="listitem" aria-label="第一步：对准红绿灯">
          <div class="step-icon step1" aria-hidden="true">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <rect x="4" y="2" width="28" height="32" rx="4" stroke="#00d26a" stroke-width="2" fill="none"/>
              <circle cx="18" cy="10" r="4" fill="#ff4757" opacity="0.8"/>

    <!-- ===== Settings Panel ===== -->
    <div class="settings-overlay" id="settingsOverlay" role="dialog" aria-label="设置面板" aria-hidden="true">
      <div class="settings-panel">
        <div class="settings-handle"></div>

        <div class="setting-item">

    <!-- Toast Notification -->

<script>
(function() {
  'use strict';

  // ===== State =====
  var state = {
    isOnboard: true,
    isPressed: false,
    isScanning: false,
    scanTimer: null,
    keyboardResetTimer: null,
    voiceEnabled: true,
    vibrateEnabled: true,
    autoEnabled: false,
    autoTimer: null,
    autoLoopCount: 0,
    lastResult: null,          // Last detected color (for change detection)
    lastResultRaw: null,       // Last raw result object from server
    touchDebounce: false,
    cameraReady: false,        // Whether camera stream is active
    cameraStream: null,        // MediaStream reference
    isRequestInProgress: false, // Prevent concurrent API requests
    toastTimer: null,          // Toast hide timer
  };

  // ===== Constants =====
  var MAX_AUTO_LOOPS = 10;
  var KEYBOARD_RESET_DELAY = 3000;
  var SCAN_INTERVAL = 2000;       // Capture and send every 2 seconds
  var API_TIMEOUT = 3000;         // 3 second timeout for API calls
  var CONFIDENCE_THRESHOLD = 0.3; // Minimum confidence for normal report

  // ===== DOM Elements =====
  var onboardPage = document.getElementById('onboardPage');
  var mainPage = document.getElementById('mainPage');
  var startBtn = document.getElementById('startBtn');
  var mainBtn = document.getElementById('mainBtn');
  var btnWrapper = document.getElementById('btnWrapper');
  var statusText = document.getElementById('statusText');
  var statusSub = document.getElementById('statusSub');
  var settingsBtn = document.getElementById('settingsBtn');
  var settingsOverlay = document.getElementById('settingsOverlay');
  var toggleVoice = document.getElementById('toggleVoice');
  var toggleVibrate = document.getElementById('toggleVibrate');
  var toggleAuto = document.getElementById('toggleAuto');

  // Camera related elements
  var cameraVideo = document.getElementById('cameraVideo');
  var cameraPreview = document.getElementById('cameraPreview');
  var cameraPlaceholder = document.getElementById('cameraPlaceholder');
  var cameraError = document.getElementById('cameraError');
  var cameraErrorText = document.getElementById('cameraErrorText');
  var cameraScanOverlay = document.getElementById('cameraScanOverlay');
  var captureCanvas = document.getElementById('captureCanvas');
  var toastEl = document.getElementById('toast');

  // ===== Toast Notification =====
  function showToast(message, type) {
    clearTimeout(state.toastTimer);
    toastEl.textContent = message;
    toastEl.className = 'toast';
    if (type === 'error') {
      toastEl.classList.add('toast-error');
    } else if (type === 'warning') {
      toastEl.classList.add('toast-warning');
    }
    // Force reflow for re-triggering animation
    void toastEl.offsetWidth;
    toastEl.classList.add('show');
    state.toastTimer = setTimeout(function() {
      toastEl.classList.remove('show');
    }, 3500);
  }

  // ===== Camera Initialization =====
  function initCamera() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showCameraError('您的浏览器不支持摄像头功能');
      return;
    }

    navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment',
        width: { ideal: 640 },
        height: { ideal: 480 }
      }
    }).then(function(stream) {
      state.cameraStream = stream;
      state.cameraReady = true;
      cameraVideo.srcObject = stream;
      cameraPreview.classList.add('active');
      statusSub.textContent = '按住按钮开始识别';
    }).catch(function(err) {
      console.error('Camera error:', err);
      if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
        showCameraError('请允许摄像头权限');
        showToast('请允许摄像头权限后刷新页面', 'error');
      } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
        showCameraError('未检测到摄像头设备');
        showToast('未检测到摄像头设备', 'error');
      } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
        showCameraError('摄像头被其他应用占用');
        showToast('摄像头被其他应用占用', 'error');
      } else {
        showCameraError('摄像头启动失败');
        showToast('摄像头启动失败: ' + err.message, 'error');
      }
    });
  }

  function showCameraError(message) {
    state.cameraReady = false;
    cameraErrorText.textContent = message;
    cameraError.classList.add('show');
    cameraPlaceholder.style.display = 'none';
    statusSub.textContent = '摄像头不可用';
  }

  function stopCamera() {
    if (state.cameraStream) {
      state.cameraStream.getTracks().forEach(function(track) {
        track.stop();
      });
      state.cameraStream = null;
    }
    state.cameraReady = false;
  }

  // ===== Capture Frame from Camera =====
  function captureFrame() {
    if (!state.cameraReady || !cameraVideo.videoWidth) {
      return null;
    }

    var ctx = captureCanvas.getContext('2d');
    captureCanvas.width = 640;
    captureCanvas.height = 480;

    // Calculate crop to fill 640x480 from video aspect ratio
    var vw = cameraVideo.videoWidth;
    var vh = cameraVideo.videoHeight;
    var targetW = 640;
    var targetH = 480;

    var scale = Math.max(targetW / vw, targetH / vh);
    var sw = targetW / scale;
    var sh = targetH / scale;
    var sx = (vw - sw) / 2;
    var sy = (vh - sh) / 2;

    ctx.drawImage(cameraVideo, sx, sy, sw, sh, 0, 0, targetW, targetH);

    // Convert to base64 (JPEG for smaller size)
    var dataURL = captureCanvas.toDataURL('image/jpeg', 0.8);
    // Remove the data URL prefix, keep only base64 data
    return dataURL.replace(/^data:image\/jpeg;base64,/, '');
  }

  // ===== Send Frame to API =====
  function sendToAPI(base64Data) {
    if (state.isRequestInProgress) return;
    state.isRequestInProgress = true;

    var controller = new AbortController();
    var timeoutId = setTimeout(function() {
      controller.abort();
    }, API_TIMEOUT);

    fetch('/api/detect', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ image: base64Data }),
      signal: controller.signal
    }).then(function(response) {
      clearTimeout(timeoutId);
      state.isRequestInProgress = false;

      if (!response.ok) {
        throw new Error('Server returned ' + response.status);
      }

      return response.json();
    }).then(function(data) {
      handleAPIResult(data);
    }).catch(function(err) {
      state.isRequestInProgress = false;

      if (err.name === 'AbortError') {
        // Timeout
        showToast('识别超时，请重试', 'warning');
        statusText.textContent = '识别超时';
        statusSub.textContent = '请检查网络后重试';
      } else {
        // Network error
        showToast('连接服务器失败，请检查网络', 'error');
        statusText.textContent = '连接失败';
        statusSub.textContent = '请检查网络连接';
      }

      // If auto mode is on and still pressed, schedule next attempt
      if (state.autoEnabled && state.isPressed) {
        scheduleNextScan();
      }
    });
  }

  // ===== Handle API Response =====
  function handleAPIResult(data) {
    if (!state.isPressed) return;

    var detected = data.detected === true;
    var color = data.color || 'unknown';
    var confidence = typeof data.confidence === 'number' ? data.confidence : 0;

    // Determine the result type
    var resultType;
    var speechText;
    var isLowConfidence = confidence < CONFIDENCE_THRESHOLD;

    if (!detected || color === 'unknown') {
      resultType = 'gray';
      speechText = '未检测到红绿灯';
    } else if (isLowConfidence) {
      // Low confidence - map color for visual but use special speech
      resultType = colorToResultType(color);
      speechText = '信号不清晰，请确认后通过';
    } else {
      resultType = colorToResultType(color);

      // Check for signal change (high confidence only)
      var prevColor = state.lastResult;
      if (prevColor === 'green' && color === 'red') {
        speechText = '注意，已变红灯';
      } else if (prevColor === 'red' && color === 'green') {
        speechText = '已变绿灯，可以通行';
      } else {
        // Normal mapping
        var speechMap = {
          green: '绿灯，可以通行',
          red: '红灯，请等待',
          yellow: '黄灯，请注意'
        };
        speechText = speechMap[color] || '未检测到红绿灯';
      }
    }

    // Update last result for change detection
    if (detected && color !== 'unknown') {
      state.lastResult = color;
    }

    showResult(resultType, speechText, confidence);
  }

  function colorToResultType(color) {
    var map = {
      green: 'green',
      red: 'red',
      yellow: 'yellow'
    };
    return map[color] || 'gray';
  }

  // ===== Navigation =====
  startBtn.addEventListener('click', function() {
    onboardPage.classList.add('hidden');
    mainPage.classList.remove('hidden');
    state.isOnboard = false;
    // Initialize camera when entering main page
    initCamera();
    setTimeout(function() { mainBtn.focus(); }, 500);
  });

  // ===== Main Button Interaction =====
  function startScan() {
    if (state.isScanning) return;
    if (state.touchDebounce) return;

    // Check camera availability
    if (!state.cameraReady) {
      showToast('摄像头不可用，请检查权限', 'error');
      return;
    }

    // Clear any existing timers
    clearTimeout(state.scanTimer);
    clearTimeout(state.autoTimer);
    clearTimeout(state.keyboardResetTimer);

    state.isPressed = true;
    state.isScanning = true;
    state.touchDebounce = true;

    btnWrapper.classList.add('pressing', 'scanning');
    btnWrapper.classList.remove('result-green', 'result-red', 'result-yellow', 'result-gray');
    mainBtn.textContent = '识别中...';
    statusText.textContent = '正在识别...';
    statusSub.textContent = '请保持手机对准红绿灯';

    // Show scanning overlay on camera
    cameraScanOverlay.classList.add('active');

    // Vibrate
    if (state.vibrateEnabled && navigator.vibrate) {
      navigator.vibrate(50);
    }

    // Speak "scanning"
    if (state.voiceEnabled) {
      speak('正在识别');
    }

    // Capture and send first frame immediately
    performCapture();

    // Set up interval for continuous capture (every 2 seconds)
    state.scanTimer = setInterval(function() {
      if (state.isPressed && state.cameraReady) {
        performCapture();
      }
    }, SCAN_INTERVAL);
  }

  function performCapture() {
    if (!state.isPressed || !state.cameraReady) return;

    var base64Data = captureFrame();
    if (base64Data) {
      sendToAPI(base64Data);
    } else {
      showToast('无法截取摄像头画面', 'warning');
    }
  }

  function scheduleNextScan() {
    if (state.autoEnabled && state.isPressed) {
      state.autoLoopCount++;
      if (state.autoLoopCount >= MAX_AUTO_LOOPS) {
        if (state.voiceEnabled) {
          setTimeout(function() { speak('已达到最大识别次数'); }, 1500);
        }
        return;
      }
      state.autoTimer = setTimeout(function() {
        if (state.isPressed) {
          btnWrapper.classList.remove('result-green', 'result-red', 'result-yellow', 'result-gray');
          // Restart scanning
          state.isScanning = true;
          btnWrapper.classList.add('pressing', 'scanning');
          mainBtn.textContent = '识别中...';
          statusText.textContent = '正在识别...';
          statusSub.textContent = '请保持手机对准红绿灯';
          cameraScanOverlay.classList.add('active');
          performCapture();
        }
      }, 3000);
    }
  }

  function showResult(resultType, speechText, confidence) {
    state.isScanning = false;
    state.touchDebounce = false;
    btnWrapper.classList.remove('pressing', 'scanning');
    cameraScanOverlay.classList.remove('active');

    var configs = {
      green: {
        btnText: '可以通行',
        statusText: '绿灯 - 可以通行',
        statusSub: '前方绿灯，请安全通过',
        vibrate: [100, 50, 100],
      },
      red: {
        btnText: '请等待',
        statusText: '红灯 - 请等待',
        statusSub: '前方红灯，请耐心等待',
        vibrate: [200],
      },
      yellow: {
        btnText: '请注意',
        statusText: '黄灯 - 请注意',
        statusSub: '即将变灯，请注意安全',
        vibrate: [100, 50, 100, 50, 100],
      },
      gray: {
        btnText: '无法确认',
        statusText: '无法确认信号',
        statusSub: '请调整角度后重试',
        vibrate: [50, 50, 50, 50, 50],
      },
    };

    var config = configs[resultType] || configs.gray;
    state.lastResult = resultType;
    btnWrapper.classList.add('result-' + resultType);
    mainBtn.textContent = config.btnText;
    statusText.textContent = config.statusText;
    statusSub.textContent = config.statusSub;

    // Show confidence if available
    if (typeof confidence === 'number' && confidence > 0) {
      var pct = Math.round(confidence * 100);
      statusSub.textContent = config.statusSub + ' (' + pct + '%)';
    }

    // Vibrate
    if (state.vibrateEnabled && navigator.vibrate) {
      navigator.vibrate(config.vibrate);
    }

    // Speech
    if (state.voiceEnabled && speechText) {
      speak(speechText);
    }

    // Auto-repeat with loop limit
    if (state.autoEnabled && state.isPressed) {
      scheduleNextScan();
    }
  }

  function resetButton() {
    state.isPressed = false;
    state.isScanning = false;
    state.touchDebounce = false;
    state.autoLoopCount = 0;
    state.isRequestInProgress = false;

    // Clear interval and timers
    clearInterval(state.scanTimer);
    clearTimeout(state.autoTimer);
    clearTimeout(state.keyboardResetTimer);
    state.scanTimer = null;

    btnWrapper.classList.remove('pressing', 'scanning', 'result-green', 'result-red', 'result-yellow', 'result-gray');
    mainBtn.textContent = '按住识别';
    statusText.textContent = '准备就绪';
    statusSub.textContent = state.cameraReady ? '按住按钮开始识别' : '摄像头不可用';

    // Hide scanning overlay
    cameraScanOverlay.classList.remove('active');

    // Stop vibration
    if (navigator.vibrate) {
      navigator.vibrate(0);
    }
  }

  // Touch events
  mainBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    startScan();
  }, { passive: false });

  mainBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    resetButton();
  }, { passive: false });

  mainBtn.addEventListener('touchcancel', function(e) {
    resetButton();
  });

  // Mouse events
  mainBtn.addEventListener('mousedown', function(e) {
    e.preventDefault();
    startScan();
  });

  mainBtn.addEventListener('mouseup', function(e) {
    resetButton();
  });

  mainBtn.addEventListener('mouseleave', function(e) {
    if (state.isPressed) resetButton();
  });

  // Keyboard support (press to start, release to reset after delay)
  mainBtn.addEventListener('keydown', function(e) {
    if ((e.key === ' ' || e.key === 'Enter') && !state.isPressed) {
      e.preventDefault();
      startScan();
    }
  });

  mainBtn.addEventListener('keyup', function(e) {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (state.isScanning) {
        resetButton();
      } else if (state.isPressed) {
        clearTimeout(state.keyboardResetTimer);
        state.keyboardResetTimer = setTimeout(function() { resetButton(); }, KEYBOARD_RESET_DELAY);
      }
    }
  });

  // ===== Speech Synthesis =====
  var voicesLoaded = false;

  function loadVoices() {
    if ('speechSynthesis' in window) {
      var voices = window.speechSynthesis.getVoices();
      if (voices.length > 0) voicesLoaded = true;
    }
  }

  if ('speechSynthesis' in window) {
    loadVoices();
    window.speechSynthesis.onvoiceschanged = function() {
      loadVoices();
    };
  }

  function speak(text) {
    if (!('speechSynthesis' in window)) return;

    window.speechSynthesis.cancel();

    var utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    utterance.volume = 1.0;

    var trySetVoice = function() {
      var voices = window.speechSynthesis.getVoices();
      var zhVoice = voices.find(function(v) { return v.lang.startsWith('zh'); });
      if (zhVoice) {
        utterance.voice = zhVoice;
        window.speechSynthesis.speak(utterance);
      } else if (!voicesLoaded) {
        setTimeout(function() {
          voicesLoaded = true;
          var retryVoices = window.speechSynthesis.getVoices();
          var retryZhVoice = retryVoices.find(function(v) { return v.lang.startsWith('zh'); });
          if (retryZhVoice) utterance.voice = retryZhVoice;
          window.speechSynthesis.speak(utterance);
        }, 200);
      } else {
        window.speechSynthesis.speak(utterance);
      }
    };

    trySetVoice();
  }

  // ===== Settings =====
  settingsBtn.addEventListener('click', function() {
    settingsOverlay.classList.add('show');
    settingsOverlay.setAttribute('aria-hidden', 'false');
    setTimeout(function() { toggleVoice.focus(); }, 350);
  });

  function closeSettings() {
    settingsOverlay.classList.remove('show');
    settingsOverlay.setAttribute('aria-hidden', 'true');
    settingsBtn.focus();
  }

  settingsOverlay.addEventListener('click', function(e) {
    if (e.target === settingsOverlay) {
      closeSettings();
    }
  });

  // Escape key closes settings panel
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && settingsOverlay.classList.contains('show')) {
      closeSettings();
    }
  });

  function setupToggle(btn, key) {
    btn.addEventListener('click', function() {
      state[key] = !state[key];
      btn.classList.toggle('on', state[key]);
      btn.setAttribute('aria-checked', state[key] ? 'true' : 'false');
    });
  }

  setupToggle(toggleVoice, 'voiceEnabled');
  setupToggle(toggleVibrate, 'vibrateEnabled');
  setupToggle(toggleAuto, 'autoEnabled');

  // ===== Prevent context menu on long press =====
  document.addEventListener('contextmenu', function(e) {
    if (e.target === mainBtn || btnWrapper.contains(e.target)) {
      e.preventDefault();
    }
  });

  // ===== Prevent scrolling when pressing button =====
  document.body.addEventListener('touchmove', function(e) {
    if (state.isPressed) {
      e.preventDefault();
    }
  }, { passive: false });

  // ===== Cleanup on page unload =====
  window.addEventListener('beforeunload', function() {
    stopCamera();
  });

})();
</script>

</body>
</html>
